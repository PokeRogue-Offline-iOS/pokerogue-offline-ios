name: Create Release

on:
  workflow_dispatch:

permissions:
  actions: write   # needed to trigger and query other workflow runs
  contents: write  # needed to create the GitHub release

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Record a timestamp just before triggering each build, then locate the
      # resulting run ID by finding the first run created after that moment.
      # This avoids any dependency on workflow inputs being queryable via API.
      # -----------------------------------------------------------------------
      - name: Trigger iOS build
        id: trigger_ios
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          gh workflow run build-ios.yml --ref "${{ github.ref_name }}"
          echo "triggered_after=$TS" >> $GITHUB_OUTPUT

      - name: Trigger Android build
        id: trigger_android
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          gh workflow run build-android.yml --ref "${{ github.ref_name }}"
          echo "triggered_after=$TS" >> $GITHUB_OUTPUT

      # -----------------------------------------------------------------------
      # Locate the run IDs by polling for runs created after the trigger
      # timestamps. Retry for up to 2 minutes to allow GitHub to register them.
      # -----------------------------------------------------------------------
      - name: Locate run IDs
        id: runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          IOS_AFTER: ${{ steps.trigger_ios.outputs.triggered_after }}
          ANDROID_AFTER: ${{ steps.trigger_android.outputs.triggered_after }}
        run: |
          set -e

          locate_run() {
            local workflow="$1"
            local after="$2"
            local label="$3"

            for i in $(seq 1 24); do
              RUN_ID=$(gh api \
                "repos/$REPO/actions/workflows/${workflow}/runs?per_page=5&created=>=${after}" \
                --jq '.workflow_runs | sort_by(.created_at) | .[0].id // empty')
              if [ -n "$RUN_ID" ]; then
                echo "Found $label run: $RUN_ID"
                echo "$RUN_ID"
                return 0
              fi
              echo "Waiting for $label run to appear... (attempt $i/24)"
              sleep 5
            done

            echo "ERROR: Timed out locating $label run ID."
            return 1
          }

          IOS_RUN_ID=$(locate_run "build-ios.yml" "$IOS_AFTER" "iOS")
          ANDROID_RUN_ID=$(locate_run "build-android.yml" "$ANDROID_AFTER" "Android")

          echo "ios_run_id=$IOS_RUN_ID" >> $GITHUB_OUTPUT
          echo "android_run_id=$ANDROID_RUN_ID" >> $GITHUB_OUTPUT

      # -----------------------------------------------------------------------
      # Poll until both runs reach a terminal state.
      # Timeout after 90 minutes (iOS builds on macos-latest can be slow).
      # -----------------------------------------------------------------------
      - name: Wait for builds to complete
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          IOS_RUN_ID: ${{ steps.runs.outputs.ios_run_id }}
          ANDROID_RUN_ID: ${{ steps.runs.outputs.android_run_id }}
        run: |
          set -e

          TIMEOUT=5400  # 90 minutes
          POLL=30
          ELAPSED=0

          while true; do
            IOS_STATUS=$(gh api "repos/$REPO/actions/runs/$IOS_RUN_ID" --jq '.status')
            IOS_CONCLUSION=$(gh api "repos/$REPO/actions/runs/$IOS_RUN_ID" --jq '.conclusion')
            ANDROID_STATUS=$(gh api "repos/$REPO/actions/runs/$ANDROID_RUN_ID" --jq '.status')
            ANDROID_CONCLUSION=$(gh api "repos/$REPO/actions/runs/$ANDROID_RUN_ID" --jq '.conclusion')

            echo "iOS: $IOS_STATUS / $IOS_CONCLUSION  |  Android: $ANDROID_STATUS / $ANDROID_CONCLUSION  (${ELAPSED}s elapsed)"

            if [ "$IOS_STATUS" = "completed" ] && [ "$ANDROID_STATUS" = "completed" ]; then
              if [ "$IOS_CONCLUSION" != "success" ]; then
                echo "ERROR: iOS build ended with: $IOS_CONCLUSION"
                exit 1
              fi
              if [ "$ANDROID_CONCLUSION" != "success" ]; then
                echo "ERROR: Android build ended with: $ANDROID_CONCLUSION"
                exit 1
              fi
              echo "Both builds succeeded."
              break
            fi

            ELAPSED=$((ELAPSED + POLL))
            if [ $ELAPSED -ge $TIMEOUT ]; then
              echo "ERROR: Timed out waiting for builds to complete."
              exit 1
            fi
            sleep $POLL
          done

      # -----------------------------------------------------------------------
      # Download both artifacts into the workspace.
      # -----------------------------------------------------------------------
      - name: Download IPA artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          IOS_RUN_ID: ${{ steps.runs.outputs.ios_run_id }}
        run: |
          ARTIFACT_ID=$(gh api "repos/$REPO/actions/runs/$IOS_RUN_ID/artifacts" \
            --jq '.artifacts[] | select(.name == "PokeRogueOffline-iOS") | .id')
          gh api "repos/$REPO/actions/artifacts/$ARTIFACT_ID/zip" > ipa.zip
          unzip ipa.zip -d ipa-out
          mv ipa-out/PokeRogueOffline.ipa ./PokeRogueOffline.ipa

      - name: Download APK artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ANDROID_RUN_ID: ${{ steps.runs.outputs.android_run_id }}
        run: |
          ARTIFACT_ID=$(gh api "repos/$REPO/actions/runs/$ANDROID_RUN_ID/artifacts" \
            --jq '.artifacts[] | select(.name == "PokeRogueOffline-Android") | .id')
          gh api "repos/$REPO/actions/artifacts/$ARTIFACT_ID/zip" > apk.zip
          unzip apk.zip -d apk-out
          mv apk-out/PokeRogueOffline.apk ./PokeRogueOffline.apk

      # -----------------------------------------------------------------------
      # Derive the version string from the IPA's embedded Info.plist.
      # -----------------------------------------------------------------------
      - name: Extract version from IPA
        id: version
        run: |
          unzip -o PokeRogueOffline.ipa -d ipa_inspect > /dev/null
          PLIST=$(find ipa_inspect -name Info.plist | head -1)
          VERSION=$(python3 -c "
          import plistlib
          with open('$PLIST', 'rb') as f:
              pl = plistlib.load(f)
          print(pl.get('CFBundleShortVersionString', 'unknown'))
          ")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          rm -rf ipa_inspect

      # -----------------------------------------------------------------------
      # Publish the combined GitHub release.
      # -----------------------------------------------------------------------
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ github.run_number }}
          name: PokeRogueOffline v${{ steps.version.outputs.version }}
          body: |
            ## PokeRogueOffline v${{ steps.version.outputs.version }}

            - **PokeRogueOffline.ipa** — iOS (sideload via SideStore / LiveContainer / Feather)
            - **PokeRogueOffline.apk** — Android (sideload by enabling "Install unknown apps")
          files: |
            PokeRogueOffline.ipa
            PokeRogueOffline.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
