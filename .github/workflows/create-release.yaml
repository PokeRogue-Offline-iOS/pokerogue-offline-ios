name: Create Release

on:
  workflow_dispatch:

permissions:
  actions: write   # needed to trigger and query other workflow runs
  contents: write  # needed to create the GitHub release

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Trigger both build workflows, passing this run's ID so each build
      # names its artifact  release-<this_run_id>-ios / ...-android  which we
      # can look up unambiguously even if other builds are running in parallel.
      # -----------------------------------------------------------------------
      - name: Trigger iOS build
        id: trigger_ios
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run build-ios.yml \
            --ref "${{ github.ref_name }}" \
            --field release_run_id="${{ github.run_id }}"

      - name: Trigger Android build
        id: trigger_android
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run build-android.yml \
            --ref "${{ github.ref_name }}" \
            --field release_run_id="${{ github.run_id }}"

      # -----------------------------------------------------------------------
      # Give the runners a moment to register before we start polling.
      # -----------------------------------------------------------------------
      - name: Wait for builds to start
        run: sleep 15

      # -----------------------------------------------------------------------
      # Poll until both child runs reach a terminal state.
      # We identify each run by looking for runs that were triggered after this
      # workflow started and carry the matching release_run_id input.
      # Timeout after 90 minutes (iOS builds on macos-latest can be slow).
      # -----------------------------------------------------------------------
      - name: Wait for builds to complete
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RELEASE_RUN_ID: ${{ github.run_id }}
        run: |
          set -e

          TIMEOUT=5400   # 90 minutes in seconds
          POLL=30        # check every 30 seconds
          ELAPSED=0

          ios_run_id=""
          android_run_id=""

          echo "Locating child run IDs..."

          # Keep trying to find the run IDs until both are found or we time out
          while [ -z "$ios_run_id" ] || [ -z "$android_run_id" ]; do
            if [ -z "$ios_run_id" ]; then
              ios_run_id=$(gh api \
                "repos/$REPO/actions/workflows/build-ios.yml/runs?per_page=10" \
                --jq ".workflow_runs[] |
                  select(.status != \"completed\" or .conclusion == null) |
                  select(.inputs.release_run_id == \"$RELEASE_RUN_ID\") |
                  .id" | head -1)
              # Also check recently completed runs in case it already finished
              if [ -z "$ios_run_id" ]; then
                ios_run_id=$(gh api \
                  "repos/$REPO/actions/workflows/build-ios.yml/runs?per_page=10" \
                  --jq ".workflow_runs[] |
                    select(.inputs.release_run_id == \"$RELEASE_RUN_ID\") |
                    .id" | head -1)
              fi
              [ -n "$ios_run_id" ] && echo "Found iOS run: $ios_run_id"
            fi

            if [ -z "$android_run_id" ]; then
              android_run_id=$(gh api \
                "repos/$REPO/actions/workflows/build-android.yml/runs?per_page=10" \
                --jq ".workflow_runs[] |
                  select(.inputs.release_run_id == \"$RELEASE_RUN_ID\") |
                  .id" | head -1)
              [ -n "$android_run_id" ] && echo "Found Android run: $android_run_id"
            fi

            if [ -z "$ios_run_id" ] || [ -z "$android_run_id" ]; then
              ELAPSED=$((ELAPSED + POLL))
              if [ $ELAPSED -ge $TIMEOUT ]; then
                echo "ERROR: Timed out waiting for child run IDs."
                exit 1
              fi
              echo "Still looking for run IDs... (${ELAPSED}s elapsed)"
              sleep $POLL
            fi
          done

          echo "ios_run_id=$ios_run_id"     >> $GITHUB_ENV
          echo "android_run_id=$android_run_id" >> $GITHUB_ENV

          echo "Waiting for both builds to complete..."

          while true; do
            ios_status=$(gh api "repos/$REPO/actions/runs/$ios_run_id" --jq '.status')
            ios_conclusion=$(gh api "repos/$REPO/actions/runs/$ios_run_id" --jq '.conclusion')
            android_status=$(gh api "repos/$REPO/actions/runs/$android_run_id" --jq '.status')
            android_conclusion=$(gh api "repos/$REPO/actions/runs/$android_run_id" --jq '.conclusion')

            echo "iOS: $ios_status / $ios_conclusion  |  Android: $android_status / $android_conclusion  (${ELAPSED}s elapsed)"

            ios_done=false
            android_done=false
            [ "$ios_status" = "completed" ] && ios_done=true
            [ "$android_status" = "completed" ] && android_done=true

            if $ios_done && $android_done; then
              # Both finished — check for failures
              if [ "$ios_conclusion" != "success" ]; then
                echo "ERROR: iOS build ended with conclusion: $ios_conclusion"
                exit 1
              fi
              if [ "$android_conclusion" != "success" ]; then
                echo "ERROR: Android build ended with conclusion: $android_conclusion"
                exit 1
              fi
              echo "Both builds succeeded."
              break
            fi

            ELAPSED=$((ELAPSED + POLL))
            if [ $ELAPSED -ge $TIMEOUT ]; then
              echo "ERROR: Timed out waiting for builds to complete."
              exit 1
            fi
            sleep $POLL
          done

      # -----------------------------------------------------------------------
      # Download both artifacts into the workspace.
      # -----------------------------------------------------------------------
      - name: Download IPA artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh api \
            "repos/$REPO/actions/runs/$ios_run_id/artifacts" \
            --jq '.artifacts[] | select(.name == "release-${{ github.run_id }}-ios") | .id' \
            | xargs -I{} gh api "repos/$REPO/actions/artifacts/{}/zip" > ipa.zip
          unzip ipa.zip -d ipa-out
          mv ipa-out/PokeRogueOffline.ipa ./PokeRogueOffline.ipa

      - name: Download APK artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh api \
            "repos/$REPO/actions/runs/$android_run_id/artifacts" \
            --jq '.artifacts[] | select(.name == "release-${{ github.run_id }}-android") | .id' \
            | xargs -I{} gh api "repos/$REPO/actions/artifacts/{}/zip" > apk.zip
          unzip apk.zip -d apk-out
          mv apk-out/PokeRogueOffline.apk ./PokeRogueOffline.apk

      # -----------------------------------------------------------------------
      # Derive the version string from the IPA's embedded Info.plist so the
      # release tag is consistent with what the build workflows produced.
      # -----------------------------------------------------------------------
      - name: Extract version from IPA
        id: version
        run: |
          unzip -o PokeRogueOffline.ipa -d ipa_inspect > /dev/null
          PLIST=$(find ipa_inspect -name Info.plist | head -1)
          # PlistBuddy is macOS-only; use python on ubuntu
          VERSION=$(python3 - <<'EOF'
          import plistlib, sys
          with open("$PLIST", "rb") as f:
              pl = plistlib.load(f)
          print(pl.get("CFBundleShortVersionString", "unknown"))
          EOF
          )
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          rm -rf ipa_inspect
        env:
          PLIST: ${{ github.workspace }}/ipa_inspect/Payload/App.app/Info.plist

      # -----------------------------------------------------------------------
      # Publish the combined GitHub release.
      # -----------------------------------------------------------------------
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ github.run_number }}
          name: PokeRogueOffline v${{ steps.version.outputs.version }}
          body: |
            ## PokeRogueOffline v${{ steps.version.outputs.version }}

            - **PokeRogueOffline.ipa** — iOS (sideload via SideStore / LiveContainer / Feather)
            - **PokeRogueOffline.apk** — Android (sideload by enabling "Install unknown apps")
          files: |
            PokeRogueOffline.ipa
            PokeRogueOffline.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
