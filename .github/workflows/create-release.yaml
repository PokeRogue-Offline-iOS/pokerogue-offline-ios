name: Create Release

on:
  workflow_dispatch:

permissions:
  actions: write   # needed to trigger and query other workflow runs
  contents: write  # needed to create the GitHub release

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Record a timestamp just before triggering each build, then locate the
      # resulting run ID by finding the first run created after that moment.
      # -----------------------------------------------------------------------
      - name: Trigger iOS build
        id: trigger_ios
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          gh workflow run build-ios.yml --ref "${{ github.ref_name }}"
          echo "triggered_after=$TS" >> $GITHUB_OUTPUT

      - name: Trigger Android build
        id: trigger_android
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          gh workflow run build-android.yml --ref "${{ github.ref_name }}"
          echo "triggered_after=$TS" >> $GITHUB_OUTPUT

      - name: Trigger Linux build
        id: trigger_linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          gh workflow run build-linux.yml --ref "${{ github.ref_name }}"
          echo "triggered_after=$TS" >> $GITHUB_OUTPUT

      # -----------------------------------------------------------------------
      # Locate all three run IDs by polling for runs created after the trigger
      # timestamps. Retry for up to 2 minutes.
      # -----------------------------------------------------------------------
      - name: Locate run IDs
        id: runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          IOS_AFTER:     ${{ steps.trigger_ios.outputs.triggered_after }}
          ANDROID_AFTER: ${{ steps.trigger_android.outputs.triggered_after }}
          LINUX_AFTER:   ${{ steps.trigger_linux.outputs.triggered_after }}
        run: |
          set -e

          locate_run() {
            local workflow="$1"
            local after="$2"
            local label="$3"
            local outfile="$4"

            for i in $(seq 1 24); do
              RUN_ID=$(gh api \
                "repos/$REPO/actions/workflows/${workflow}/runs?per_page=5&created=>=${after}" \
                --jq '.workflow_runs | sort_by(.created_at) | .[0].id // empty')
              if [ -n "$RUN_ID" ]; then
                echo "Found $label run: $RUN_ID"
                echo "$RUN_ID" > "$outfile"
                return 0
              fi
              echo "Waiting for $label run to appear... (attempt $i/24)"
              sleep 5
            done

            echo "ERROR: Timed out locating $label run ID."
            return 1
          }

          locate_run "build-ios.yml"     "$IOS_AFTER"     "iOS"     /tmp/ios_run_id
          locate_run "build-android.yml" "$ANDROID_AFTER" "Android" /tmp/android_run_id
          locate_run "build-linux.yml"   "$LINUX_AFTER"   "Linux"   /tmp/linux_run_id

          echo "ios_run_id=$(cat /tmp/ios_run_id)"         >> $GITHUB_OUTPUT
          echo "android_run_id=$(cat /tmp/android_run_id)" >> $GITHUB_OUTPUT
          echo "linux_run_id=$(cat /tmp/linux_run_id)"     >> $GITHUB_OUTPUT

      # -----------------------------------------------------------------------
      # Poll until all three builds reach a terminal state.
      # Timeout after 90 minutes. If one fails, the others are cancelled.
      # -----------------------------------------------------------------------
      - name: Wait for builds to complete
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          IOS_RUN_ID:     ${{ steps.runs.outputs.ios_run_id }}
          ANDROID_RUN_ID: ${{ steps.runs.outputs.android_run_id }}
          LINUX_RUN_ID:   ${{ steps.runs.outputs.linux_run_id }}
        run: |
          set -e

          TIMEOUT=5400  # 90 minutes
          POLL=30
          ELAPSED=0

          cancel_run() {
            local run_id="$1"
            local label="$2"
            local status="$3"
            if [ "$status" != "completed" ]; then
              echo "Cancelling $label run $run_id..."
              gh api --method POST "repos/$REPO/actions/runs/$run_id/cancel" || true
            fi
          }

          while true; do
            IOS_STATUS=$(gh api     "repos/$REPO/actions/runs/$IOS_RUN_ID"     --jq '.status')
            IOS_CONCLUSION=$(gh api "repos/$REPO/actions/runs/$IOS_RUN_ID"     --jq '.conclusion')
            AND_STATUS=$(gh api     "repos/$REPO/actions/runs/$ANDROID_RUN_ID" --jq '.status')
            AND_CONCLUSION=$(gh api "repos/$REPO/actions/runs/$ANDROID_RUN_ID" --jq '.conclusion')
            LNX_STATUS=$(gh api     "repos/$REPO/actions/runs/$LINUX_RUN_ID"   --jq '.status')
            LNX_CONCLUSION=$(gh api "repos/$REPO/actions/runs/$LINUX_RUN_ID"   --jq '.conclusion')

            echo "iOS: $IOS_STATUS/$IOS_CONCLUSION | Android: $AND_STATUS/$AND_CONCLUSION | Linux: $LNX_STATUS/$LNX_CONCLUSION (${ELAPSED}s)"

            fail_if() {
              local label="$1" status="$2" conclusion="$3"
              local r1="$4" l1="$5" s1="$6"
              local r2="$7" l2="$8" s2="$9"
              if [ "$status" = "completed" ] && [ "$conclusion" != "success" ]; then
                cancel_run "$r1" "$l1" "$s1"
                cancel_run "$r2" "$l2" "$s2"
                echo "ERROR: $label build ended with: $conclusion"
                exit 1
              fi
            }

            fail_if "iOS"     "$IOS_STATUS" "$IOS_CONCLUSION" \
                    "$ANDROID_RUN_ID" "Android" "$AND_STATUS" \
                    "$LINUX_RUN_ID"   "Linux"   "$LNX_STATUS"

            fail_if "Android" "$AND_STATUS" "$AND_CONCLUSION" \
                    "$IOS_RUN_ID"     "iOS"     "$IOS_STATUS" \
                    "$LINUX_RUN_ID"   "Linux"   "$LNX_STATUS"

            fail_if "Linux"   "$LNX_STATUS" "$LNX_CONCLUSION" \
                    "$IOS_RUN_ID"     "iOS"     "$IOS_STATUS" \
                    "$ANDROID_RUN_ID" "Android" "$AND_STATUS"

            if [ "$IOS_STATUS" = "completed" ] && [ "$AND_STATUS" = "completed" ] && [ "$LNX_STATUS" = "completed" ]; then
              echo "All three builds succeeded."
              break
            fi

            ELAPSED=$((ELAPSED + POLL))
            if [ $ELAPSED -ge $TIMEOUT ]; then
              cancel_run "$IOS_RUN_ID"     "iOS"     "$IOS_STATUS"
              cancel_run "$ANDROID_RUN_ID" "Android" "$AND_STATUS"
              cancel_run "$LINUX_RUN_ID"   "Linux"   "$LNX_STATUS"
              echo "ERROR: Timed out waiting for builds to complete."
              exit 1
            fi
            sleep $POLL
          done

      # -----------------------------------------------------------------------
      # Download all three artifacts.
      # -----------------------------------------------------------------------
      - name: Download IPA artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          IOS_RUN_ID: ${{ steps.runs.outputs.ios_run_id }}
        run: |
          ARTIFACT_ID=$(gh api "repos/$REPO/actions/runs/$IOS_RUN_ID/artifacts" \
            --jq '.artifacts[] | select(.name == "PokeRogueOffline-iOS") | .id')
          gh api "repos/$REPO/actions/artifacts/$ARTIFACT_ID/zip" > ipa.zip
          unzip ipa.zip -d ipa-out
          mv ipa-out/PokeRogueOffline.ipa ./PokeRogueOffline.ipa

      - name: Download APK artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ANDROID_RUN_ID: ${{ steps.runs.outputs.android_run_id }}
        run: |
          ARTIFACT_ID=$(gh api "repos/$REPO/actions/runs/$ANDROID_RUN_ID/artifacts" \
            --jq '.artifacts[] | select(.name == "PokeRogueOffline-Android") | .id')
          gh api "repos/$REPO/actions/artifacts/$ARTIFACT_ID/zip" > apk.zip
          unzip apk.zip -d apk-out
          mv apk-out/PokeRogueOffline.apk ./PokeRogueOffline.apk

      - name: Download AppImage artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          LINUX_RUN_ID: ${{ steps.runs.outputs.linux_run_id }}
        run: |
          ARTIFACT_ID=$(gh api "repos/$REPO/actions/runs/$LINUX_RUN_ID/artifacts" \
            --jq '.artifacts[] | select(.name == "PokeRogueOffline-Linux") | .id')
          gh api "repos/$REPO/actions/artifacts/$ARTIFACT_ID/zip" > appimage.zip
          unzip appimage.zip -d appimage-out
          mv appimage-out/PokeRogueOffline.AppImage ./PokeRogueOffline.AppImage

      # -----------------------------------------------------------------------
      # Read the version string from version.txt bundled in the iOS artifact.
      # -----------------------------------------------------------------------
      - name: Read version
        id: version
        run: |
          VERSION=$(cat ipa-out/version.txt)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Found Version: ${VERSION}"

      # -----------------------------------------------------------------------
      # Publish the combined GitHub release.
      # -----------------------------------------------------------------------
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ github.run_number }}
          name: PokeRogueOffline v${{ steps.version.outputs.version }}
          body: |
            ## PokeRogueOffline v${{ steps.version.outputs.version }}

            - **PokeRogueOffline.ipa** — iOS (sideload via SideStore / LiveContainer / Feather)
            - **PokeRogueOffline.apk** — Android (enable "Install unknown apps")
            - **PokeRogueOffline.AppImage** — Linux x64 (chmod +x, then run directly)

            ### Linux quick start
            ```bash
            chmod +x PokeRogueOffline.AppImage
            ./PokeRogueOffline.AppImage
            ```
            Saves are stored in `~/.config/PokeRogueOffline/saves/`.
          files: |
            PokeRogueOffline.ipa
            PokeRogueOffline.apk
            PokeRogueOffline.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get IPA size
        id: ipa_size
        run: echo "size=$(wc -c < PokeRogueOffline.ipa)" >> $GITHUB_OUTPUT

      - name: Update AltStore source
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ github.run_number }}
          IPA_SIZE: ${{ steps.ipa_size.outputs.size }}
        run: node scripts/update-altstore-source.js

      - name: Commit updated repo.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/repo.json
          git commit -m "Update AltStore source for v${{ steps.version.outputs.version }}"
          git push

  # -----------------------------------------------------------------------
  # Runs only if the release job is cancelled.
  # -----------------------------------------------------------------------
  cancel-builds:
    runs-on: ubuntu-latest
    needs: release
    if: cancelled()
    steps:
      - name: Cancel any active build runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          cancel_active_runs() {
            local workflow="$1"
            local label="$2"

            RUN_IDS=$(gh api "repos/$REPO/actions/workflows/${workflow}/runs?per_page=10" \
              --jq '.workflow_runs[] | select(.status == "in_progress" or .status == "queued") | .id')

            if [ -z "$RUN_IDS" ]; then
              echo "No active $label runs to cancel."
              return
            fi

            for RUN_ID in $RUN_IDS; do
              echo "Cancelling $label run $RUN_ID..."
              gh api --method POST "repos/$REPO/actions/runs/$RUN_ID/cancel" || true
            done
          }

          cancel_active_runs "build-ios.yml"    "iOS"
          cancel_active_runs "build-android.yml" "Android"
          cancel_active_runs "build-linux.yml"   "Linux"
