name: Build PokeRogueOffline AppImage (Linux)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      # ── Clone upstream game ──────────────────────────────────────────────────
      - name: Clone PokeRogue
        run: git clone --recurse-submodules --depth 1 --branch main https://github.com/pagefaultgames/pokerogue.git pokerogue-src

      - name: Get PokeRogue version
        id: pokerogue_version
        run: |
          VERSION=$(node -p "require('./pokerogue-src/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # ── Download bundled save files ──────────────────────────────────────────
      - name: Download full unlocks save file
        run: |
          curl -L https://raw.githubusercontent.com/pagefaultgames/pokerogue/beta/test/utils/saves/full_unlocks_sanitized.prsv \
            -o pokerogue-src/full_unlocks.prsv

      - name: Download full reset save file
        run: |
          curl -L https://raw.githubusercontent.com/pagefaultgames/pokerogue/refs/heads/beta/test/utils/saves/data_new.prsv \
            -o pokerogue-src/data_new.prsv

      # ── Apply patches ────────────────────────────────────────────────────────
      # Use the "all" target — desktop does not use the mobile/Capacitor patches.
      - name: Apply pre-build patches (all)
        run: bash ${{ github.workspace }}/scripts/apply-patches.sh all

      # Apply Linux-specific patches that adapt the game to Electron.
      - name: Apply Linux-specific patches
        run: |
          node ${{ github.workspace }}/patches/linux/node/electron-save-bridge.js

      - name: Inject build number into banner
        run: |
          sed -i 's/BUILD_NUMBER_PLACEHOLDER/${{ github.run_number }}/g' pokerogue-src/src/ui/handlers/title-ui-handler.ts

      # ── Build game ───────────────────────────────────────────────────────────
      - name: Install PokeRogue dependencies
        working-directory: pokerogue-src
        run: pnpm install

      - name: Build PokeRogue (desktop mode)
        working-directory: pokerogue-src
        env:
          # No login bypass needed — game runs fully offline.
          VITE_BYPASS_LOGIN: '1'
        run: pnpm build --mode app

      # ── Copy save file into dist ─────────────────────────────────────────────
      - name: Copy bundled saves into dist
        run: |
          cp pokerogue-src/full_unlocks.prsv pokerogue-src/dist/full_unlocks.prsv
          cp pokerogue-src/data_new.prsv     pokerogue-src/dist/data_new.prsv

      # ── Assemble Electron app ────────────────────────────────────────────────
      - name: Copy Electron entrypoints into build tree
        run: |
          cp ${{ github.workspace }}/electron/main.js    pokerogue-src/main.js
          cp ${{ github.workspace }}/electron/preload.js pokerogue-src/preload.js
          cp ${{ github.workspace }}/docs/appIcon.png    pokerogue-src/appIcon.png

      - name: Install Electron + electron-builder
        working-directory: pokerogue-src
        run: |
          pnpm add -D electron electron-builder

      # Write electron-builder config inline so we don't need to modify
      # pokerogue-src/package.json permanently.
      - name: Write electron-builder config
        working-directory: pokerogue-src
        run: |
          cat > electron-builder.yml << 'EBEOF'
          appId: com.scooom.pokerogue-offline
          productName: PokeRogueOffline
          copyright: "Unofficial fan project — not affiliated with the PokéRogue team"

          # Entry point for the Electron main process.
          main: main.js

          # Files to include in the app package.
          files:
            - main.js
            - preload.js
            - appIcon.png
            - dist/**

          # Extra resources copied alongside the app (accessible via process.resourcesPath).
          extraResources:
            - from: dist
              to: dist

          linux:
            target:
              - target: AppImage
                arch:
                  - x64
            icon: appIcon.png
            category: Game
            synopsis: "Offline PokéRogue client for Linux"

          appImage:
            # Embed an update URL stub (no-op for now; makes AppImageUpdate happy).
            updateInformation: "zsync|https://github.com/PokeRogue-Offline/pokerogue-offline/releases/latest/download/PokeRogueOffline.AppImage.zsync"
          EBEOF

      - name: Set version in package.json
        working-directory: pokerogue-src
        run: |
          VERSION="${{ steps.pokerogue_version.outputs.version }}.${{ github.run_number }}"
          # electron-builder reads the version from package.json.
          node -e "
            const pkg = require('./package.json');
            pkg.version = '$VERSION';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

      # ── Build AppImage ───────────────────────────────────────────────────────
      # electron-builder needs fuse/libfuse2 for AppImage creation on Ubuntu 22+.
      - name: Install AppImage build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libfuse2

      - name: Build AppImage
        working-directory: pokerogue-src
        env:
          # Suppress electron-builder's own update check during CI.
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: 'true'
        run: npx electron-builder --config electron-builder.yml --linux AppImage --x64

      # ── Rename & upload artifact ─────────────────────────────────────────────
      - name: Rename AppImage
        run: |
          SRC=$(find pokerogue-src/dist-electron -name "*.AppImage" | head -1)
          echo "Found: $SRC"
          cp "$SRC" PokeRogueOffline.AppImage

      - name: Make AppImage executable
        run: chmod +x PokeRogueOffline.AppImage

      - name: Write version file
        run: echo "${{ steps.pokerogue_version.outputs.version }}" > version.txt

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: PokeRogueOffline-Linux
          path: |
            PokeRogueOffline.AppImage
            version.txt
          retention-days: 30
