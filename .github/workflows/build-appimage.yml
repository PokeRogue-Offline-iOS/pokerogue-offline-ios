name: Build PokeRogueOffline AppImage

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Clone PokeRogue fork
        run: git clone --recurse-submodules --depth 1 --branch main https://github.com/pagefaultgames/pokerogue.git pokerogue-src

      - name: Get PokeRogue version
        id: pokerogue_version
        run: |
          VERSION=$(node -p "require('./pokerogue-src/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
      - name: Download full unlocks save file
        run: |
          curl -L https://raw.githubusercontent.com/pagefaultgames/pokerogue/beta/test/utils/saves/full_unlocks_sanitized.prsv \
            -o pokerogue-src/full_unlocks.prsv

      - name: Apply patches
        run: bash ${{ github.workspace }}/scripts/apply-patches.sh appimage

      - name: Inject build number into the banner
        run: |
          sed -i 's/BUILD_NUMBER_PLACEHOLDER/${{ github.run_number }}/g' pokerogue-src/src/ui/handlers/title-ui-handler.ts

      - name: Install PokeRogue dependencies
        working-directory: pokerogue-src
        run: pnpm install

      - name: Install Electron dependencies
        working-directory: pokerogue-src
        run: pnpm add -D electron electron-builder
        
      - name: Create Electron main process file
        working-directory: pokerogue-src
        run: |
          cat > main.cjs << 'EOF'
          const { app, BrowserWindow } = require('electron');
          const path = require('path');

          let mainWindow;

          function createWindow() {
            mainWindow = new BrowserWindow({
              width: 1280,
              height: 720,
              webPreferences: {
                preload: path.join(__dirname, 'preload.js'),
                nodeIntegration: false,
                contextIsolation: true
              }
            });

            mainWindow.loadFile(path.join(__dirname, 'dist/index.html'));
            if (process.env.DEBUG) {
              mainWindow.webContents.openDevTools();
            }
          }

          app.on('ready', createWindow);
          app.on('window-all-closed', () => {
            if (process.platform !== 'darwin') app.quit();
          });
          EOF

      - name: Configure electron-builder for web app
        working-directory: pokerogue-src
        run: |
          node << 'EOF'
          const pkg = require('./package.json');
          if (!pkg.description) pkg.description = 'PokeRogue Offline';
          if (!pkg.author) pkg.author = 'Scooom';
          pkg.main = 'main.cjs';
          pkg.build = {
            "appId": "com.scooom.pkr",
            "productName": "PokeRogue Offline",
            "linux": {
              "target": ["AppImage"],
              "category": "Game"
            },
            "files": [
              "dist/**/*",
              "main.cjs",
              "node_modules/**/*",
            ]
          };
          require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2));
          EOF

      - name: Build PokeRogue
        working-directory: pokerogue-src
        env:
          VITE_BYPASS_LOGIN: '1'
        run: pnpm build --mode app

      - name: Copy full_unlocks.prsv into dist
        working-directory: pokerogue-src
        run: cp full_unlocks.prsv dist/full_unlocks.prsv

      - name: Generate AppImage
        working-directory: pokerogue-src
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm electron-builder --linux AppImage

      - name: Rename and save AppImage
        id: appimage_path
        run: |
          FILE=$(find -type f -name "*.AppImage");
          echo $FILE;
          OUTPUT="./PokeRogueOffline.AppImage";
          echo $OUTPUT;
          mv "$FILE" "$OUTPUT";
          echo "AppImage=$OUTPUT" >> $GITHUB_OUTPUT

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: PokeRogueOffline-AppImage
          path: ${{ steps.appimage_path.outputs.AppImage }}
          retention-days: 30
